<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Controle seus dias trabalhados e turnos por veículo." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dia Trabalhado" />

  <title>Dia Trabalhado</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />

  <!-- Fontes: Syne (display bold) + JetBrains Mono (valores) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#111"/>
          <rect x="6" y="8" width="10" height="6" rx="3" fill="#00E5FF"/>
          <rect x="6" y="16" width="10" height="6" rx="3" fill="#00E5FF" opacity=".4"/>
          <rect x="20" y="8" width="10" height="6" rx="3" fill="#CCFF00"/>
          <rect x="20" y="16" width="10" height="6" rx="3" fill="#CCFF00" opacity=".4"/>
          <rect x="6" y="24" width="24" height="4" rx="2" fill="#FF3C6E" opacity=".8"/>
        </svg>
        <div class="brand-text">
          <span class="brand-name">Dia Trabalhado</span>
          <span class="brand-sub" id="brandCycle">Carregando…</span>
        </div>
      </div>
      <button class="btn-nav" id="btnPrevCycle" title="Ciclo anterior">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 5 8 10 13 15"/></svg>
      </button>
      <button class="btn-nav" id="btnNextCycle" title="Próximo ciclo">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 5 12 10 7 15"/></svg>
      </button>
    </div>
  </header>

  <!-- ══════════════════════════════════════════
       CYCLE TABS
  ══════════════════════════════════════════ -->
  <div class="cycle-tabs" id="cycleTabs">
    <button class="tab active" data-cycle="0">Ciclo 1</button>
    <button class="tab" data-cycle="1">Ciclo 2</button>
  </div>

  <!-- ══════════════════════════════════════════
       MAIN
  ══════════════════════════════════════════ -->
  <main class="main" id="mainContent">
    <!-- Renderizado via JS -->
  </main>

  <!-- ══════════════════════════════════════════
       LEGENDA FIXA
  ══════════════════════════════════════════ -->
  <div class="vehicle-legend">
    <div class="legend-item">
      <span class="legend-dot fiorino"></span>
      <span>Fiorino</span>
      <span class="legend-val">R$ 130</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot van-diesel"></span>
      <span>Van Diesel</span>
      <span class="legend-val">R$ 170</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot van-eletrica"></span>
      <span>Van Elétrica</span>
      <span class="legend-val">R$ 190</span>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       TOAST
  ══════════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  <!-- ══════════════════════════════════════════
       FIREBASE SDK v9 compat
       Descomente e preencha para ativar a nuvem
  ══════════════════════════════════════════ -->
  <!--
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  -->

  <script src="app.js"></script>
</body>
</html>
