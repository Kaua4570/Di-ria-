<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo preto arredondado -->
  <rect width="512" height="512" rx="100" fill="#000000"/>

  <!-- Fiorino — azul elétrico -->
  <rect x="80"  y="80"  width="152" height="72" rx="36" fill="#00E5FF"/>
  <rect x="80"  y="168" width="152" height="72" rx="36" fill="#00E5FF" opacity="0.35"/>

  <!-- Van Diesel — verde limão -->
  <rect x="280" y="80"  width="152" height="72" rx="36" fill="#CCFF00"/>
  <rect x="280" y="80"  width="72"  height="152" rx="36" fill="#CCFF00" opacity="0.35"/>

  <!-- Van Elétrica — rosa néon (barra inferior) -->
  <rect x="80"  y="280" width="352" height="72" rx="36" fill="#FF3C6E"/>

  <!-- Ícone de raio (elétrico) -->
  <polygon points="300,320 260,370 280,370 240,420 310,355 285,355" fill="#000" opacity="0.6"/>
</svg>
