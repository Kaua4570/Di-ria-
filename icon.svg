<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo branco arredondado -->
  <rect width="512" height="512" rx="96" fill="#ffffff"/>

  <!-- Quadrante superior-esquerdo — Azul (RT1) -->
  <rect x="96" y="96" width="120" height="60" rx="30" fill="#36C5F0"/>
  <rect x="126" y="156" width="60" height="120" rx="30" fill="#36C5F0"/>

  <!-- Quadrante superior-direito — Verde (RT2) -->
  <rect x="296" y="96" width="120" height="60" rx="30" fill="#2EB67D"/>
  <rect x="296" y="96" width="60" height="120" rx="30" fill="#2EB67D"/>

  <!-- Quadrante inferior-esquerdo — Rosa (RT3) -->
  <rect x="96" y="296" width="60" height="120" rx="30" fill="#EC1561"/>
  <rect x="96" y="356" width="120" height="60" rx="30" fill="#EC1561"/>

  <!-- Quadrante inferior-direito — Amarelo (Total) -->
  <rect x="296" y="356" width="120" height="60" rx="30" fill="#ECB22E"/>
  <rect x="356" y="296" width="60" height="120" rx="30" fill="#ECB22E"/>
</svg>
